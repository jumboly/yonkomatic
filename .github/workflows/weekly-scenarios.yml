name: weekly-scenarios

# Why Sun 14:00 UTC: Sun 23:00 JST is the last hour of the current ISO week.
# Why "+1 day" for the week: Sun 23:00 JST is the last hour of the current
# ISO week, so we generate scenarios for the *next* week which starts the
# following Monday (when daily-publish first reads them).
#
# Note: schedule is commented out on the upstream template repo so cron does
# not fire here. After forking, uncomment the schedule line in your fork's
# main branch to enable automatic weekly generation. See SETUP.md.
on:
  # schedule:
  #   - cron: "0 14 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # Why fetch-depth: 0: `git pull --rebase` against the gh-pages branch
      # below needs full history to merge cleanly without unrelated-histories
      # surprises.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      # Why a separate gh-pages worktree: cron artefacts (scenarios/, state/,
      # output/, docs/) live on an orphan branch so main stays clean for
      # forks. The worktree is the write target; symlinks below redirect the
      # CLI's relative paths into it without touching cli.py.
      - name: Prepare gh-pages worktree
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages 2>/dev/null || true
          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git worktree add .gh-pages gh-pages
          else
            # First run on this fork — bootstrap the orphan branch with a
            # placeholder so Pages has something to render before the first
            # daily-publish overwrites docs/index.html.
            git worktree add --detach .gh-pages
            cd .gh-pages
            git checkout --orphan gh-pages
            git rm -rf . 2>/dev/null || true
            cat > index.html <<'HTML'
          <!doctype html>
          <title>yonkomatic</title>
          <p>first publish in progress &mdash; see
          <a href="../../actions">workflow runs</a>.</p>
          HTML
            git add index.html
            git commit -m "init: orphan gh-pages branch"
            git push -u origin gh-pages
            cd ..
          fi

      - name: Wire runtime symlinks
        run: |
          mkdir -p .gh-pages/{scenarios,state/batches,output/archive,output/preflight,docs}
          ln -sfn .gh-pages/scenarios scenarios
          ln -sfn .gh-pages/state     state
          ln -sfn .gh-pages/output    output
          ln -sfn .gh-pages/docs      docs

      - name: Compute target ISO week (next Monday's week)
        id: week
        run: echo "value=$(TZ=Asia/Tokyo date -d '+1 day' +%G-W%V)" >> "$GITHUB_OUTPUT"

      - name: Generate scenarios
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: uv run yonkomatic generate-scenarios --week "${{ steps.week.outputs.value }}"

      # Why submit batch immediately: at 50% off, kicking off the week's 7
      # images right after scenarios are written gives them ~10h to bake
      # before the first daily-publish (Mon 09:00 JST), well within the
      # batch's 24h completion window.
      - name: Submit weekly image batch
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: uv run yonkomatic batch-submit-images --week "${{ steps.week.outputs.value }}"

      - name: Commit and push to gh-pages
        run: |
          cd .gh-pages
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          for p in scenarios state/batches; do
            [ -e "$p" ] && git add "$p"
          done
          if git diff --cached --quiet; then
            echo "no scenario / batch changes (already up to date)"
          else
            git commit -m "bot: scenarios + batch for week ${{ steps.week.outputs.value }}"
            # Why pull --rebase --autostash: a daily-publish run may have
            # advanced gh-pages since worktree add; without this push would 403.
            git pull --rebase --autostash origin gh-pages
            git push origin gh-pages
          fi
