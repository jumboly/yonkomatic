name: daily-publish

# Why 00:00 UTC: 09:00 JST publish window (see ROADMAP "段階的実装").
#
# Note: schedule is commented out on the upstream template repo so cron does
# not fire here. After forking, uncomment the schedule line in your fork's
# main branch to enable daily publishing. See SETUP.md.
on:
  # schedule:
  #   - cron: "0 0 * * *"
  workflow_dispatch:

# Why contents:write: bot pushes state/site updates so progress survives runs.
permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # Why fetch-depth: 0: `git pull --rebase` against the gh-pages branch
      # below needs full history to merge cleanly without unrelated-histories
      # surprises.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      # Why a separate gh-pages worktree: cron artefacts (scenarios/, state/,
      # output/, docs/) live on an orphan branch so main stays clean for
      # forks. The worktree is the write target; symlinks below redirect the
      # CLI's relative paths into it without touching cli.py.
      - name: Prepare gh-pages worktree
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages 2>/dev/null || true
          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git worktree add .gh-pages gh-pages
          else
            # First run on this fork — bootstrap the orphan branch with a
            # placeholder so Pages has something to render before this very
            # publish overwrites docs/index.html.
            git worktree add --detach .gh-pages
            cd .gh-pages
            git checkout --orphan gh-pages
            git rm -rf . 2>/dev/null || true
            cat > index.html <<'HTML'
          <!doctype html>
          <title>yonkomatic</title>
          <p>first publish in progress &mdash; see
          <a href="../../actions">workflow runs</a>.</p>
          HTML
            git add index.html
            git commit -m "init: orphan gh-pages branch"
            git push -u origin gh-pages
            cd ..
          fi

      - name: Wire runtime symlinks
        run: |
          mkdir -p .gh-pages/{scenarios,state/batches,output/archive,output/preflight,docs}
          ln -sfn .gh-pages/scenarios scenarios
          ln -sfn .gh-pages/state     state
          ln -sfn .gh-pages/output    output
          ln -sfn .gh-pages/docs      docs

      - name: Compute today's ISO week
        id: week
        run: echo "value=$(TZ=Asia/Tokyo date +%G-W%V)" >> "$GITHUB_OUTPUT"

      # Why fetch first: weekly-scenarios submits a 50%-off image batch on
      # Sun 23:00 JST. Pulling it down before publish lets publish-today
      # use the preflight image (skipping a sync API call). Idempotent —
      # safe to re-run on a completed batch, and a no-op if the manifest
      # is missing (fresh user branch / mid-rollout).
      - name: Fetch weekly image batch (best-effort)
        continue-on-error: true
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -e "state/batches/${{ steps.week.outputs.value }}.yaml" ]; then
            uv run yonkomatic batch-fetch-images --week "${{ steps.week.outputs.value }}"
          else
            echo "no batch manifest for ${{ steps.week.outputs.value }}; falling back to sync generation"
          fi

      - name: Publish today's episode
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        run: uv run yonkomatic publish-today

      # Why best-effort and post-publish: if the weekly batch had partial
      # failures (or expired), this reissues missing episodes as a new
      # batch so subsequent days can use preflight again. Capped at 2
      # retries per week inside the CLI; sync fallback covers anything
      # past that. Idempotent: a no-op when nothing is pending.
      - name: Resubmit missing batch jobs (best-effort)
        continue-on-error: true
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -e "state/batches/${{ steps.week.outputs.value }}.yaml" ]; then
            uv run yonkomatic batch-resubmit-missing --week "${{ steps.week.outputs.value }}"
          else
            echo "no batch manifest for ${{ steps.week.outputs.value }}; nothing to resubmit"
          fi

      - name: Commit and push to gh-pages
        if: always()
        run: |
          if [ ! -d .gh-pages ]; then
            echo "gh-pages worktree was not prepared; skipping commit"
            exit 0
          fi
          cd .gh-pages
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Why per-path guard: a fresh user branch may not yet have docs/
          # (static_site disabled) or output/archive/ (first run); skipping
          # nonexistent paths is the only suppression we want here.
          for p in state docs output/archive output/preflight; do
            [ -e "$p" ] && git add "$p"
          done
          if git diff --cached --quiet; then
            echo "no committable changes (publish skipped or no enabled committers)"
          else
            git commit -m "bot: published $(TZ=Asia/Tokyo date +%Y-%m-%d)"
            # Why pull --rebase --autostash before push: weekly-scenarios
            # may have advanced gh-pages between worktree add and push;
            # without this the daily push would 403 on non-fast-forward.
            git pull --rebase --autostash origin gh-pages
            git push origin gh-pages
          fi
