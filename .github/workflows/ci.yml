name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dependencies (incl. dev group)
        run: uv sync

      - name: Lint
        run: uv run ruff check src/ tests/

      - name: Test
        run: uv run pytest
