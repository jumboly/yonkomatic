# yonkomatic のデフォルト設定。利用者は自分のブランチで上書きする。

content:
  base_dir: ./content
  prompt_filename: prompt.md
  images_dir: images
  # 1 回の生成で AI に渡す参考画像の上限。超過時は sorted 順で先頭 N 枚に切り捨て (warn ログ出力)。
  max_images: 10

ai:
  # OpenAI Chat Completions / Structured Output に使うテキストモデル。
  # 上位品質: gpt-5.5 / 軽量: gpt-5.4-mini に変更可。
  text_model: "gpt-5.4"
  # OpenAI Image Generation モデル。
  image_model: "gpt-image-2"
  # gpt-image-2 はカスタムサイズ可 (各辺 16 の倍数 / 最大 3840px / 比率 3:1 以下)。
  # 960x1280 = 真の 3:4 (4 コマ縦並びのネイティブ比)。Slack/static_site の
  # 表示サイズで dialogue + SFX が読み取れる必要十分な解像度。
  # 印刷品質を狙うなら 1536x2048 (sync $0.27/枚, batch $0.137/枚) に切替。
  image_size: "960x1280"
  # 出力フォーマット。jpeg + 90 で PNG 比 -83% / 視認劣化なし
  # (assets/demo 実測)。印刷向けに無圧縮を要するときだけ png に戻す。
  image_format: jpeg
  image_compression: 90
  max_image_retries: 3
  openai_api_key_env: OPENAI_API_KEY

publishers:
  slack:
    enabled: true
    channel_env: SLACK_CHANNEL_ID
    token_env: SLACK_BOT_TOKEN
  discord:
    enabled: false
    webhook_env: DISCORD_WEBHOOK_URL
  static_site:
    enabled: true
    # GitHub Pages の "Deploy from a branch" は Source として /(root) か /docs しか
    # 選べないため、docs/ を出力先にする。リポジトリのドキュメント類はルート直下
    # (ROADMAP.md / SPEC.md / README.md / CLAUDE.md) に置いて干渉を避ける。
    output_dir: ./docs
    base_url: "" # GitHub Pages 等の公開URL

schedule:
  # publish-today / generate-scenarios の "今日" の判定に使う TZ。
  # 実際の cron 時刻は .github/workflows/*.yml に定義されている。
  timezone: Asia/Tokyo

news:
  enabled: true
  feeds:
    # デフォルトは時事色の薄い軽量フィード。利用者が差し替え可能。
    - https://news.yahoo.co.jp/rss/topics/entertainment.xml
    - https://news.yahoo.co.jp/rss/topics/sports.xml
  max_items_per_feed: 10
  lookback_days: 7
